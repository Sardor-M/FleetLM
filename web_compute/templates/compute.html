<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FleetLM — Compute Node</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <div class="container container--narrow">
        <h1>FleetLM Compute Node</h1>
        <p class="subtitle">Your browser becomes a GPU compute node via WebGPU</p>

        <!-- GPU Info -->
        <div class="card">
            <h2>GPU Hardware</h2>
            <div class="status-row">
                <span class="label">WebGPU Support</span>
                <span class="value" id="webgpu-support">Checking...</span>
            </div>
            <div class="status-row">
                <span class="label">GPU Adapter</span>
                <span class="value" id="gpu-name">-</span>
            </div>
            <div class="status-row">
                <span class="label">Architecture</span>
                <span class="value" id="gpu-arch">-</span>
            </div>
            <div class="status-row">
                <span class="label">Max Buffer Size</span>
                <span class="value" id="gpu-buffer">-</span>
            </div>
        </div>

        <!-- Connection Status -->
        <div class="card">
            <h2>Connection</h2>
            <div class="status-row">
                <span class="label">Orchestrator</span>
                <span class="value" id="ws-status">
                    <span class="status-dot dot-gray"></span> Disconnected
                </span>
            </div>
            <div class="status-row">
                <span class="label">Node ID</span>
                <span class="value" id="node-id">-</span>
            </div>
            <div class="status-row">
                <span class="label">Assigned Layers</span>
                <span class="value" id="layers">-</span>
            </div>
            <div class="status-row">
                <span class="label">Status</span>
                <span class="value" id="node-status">Idle</span>
            </div>
        </div>

        <!-- Controls -->
        <div class="btn-row">
            <button class="btn" id="btn-start" onclick="startNode()">Connect &amp; Start</button>
            <button class="btn btn-stop" id="btn-stop" onclick="stopNode()" disabled>Stop</button>
        </div>

        <!-- Log -->
        <div class="card" style="margin-top: 1rem;">
            <h2>Log</h2>
            <div id="log"></div>
        </div>
    </div>

    <script src="/static/js/compute.js"></script>
</body>
</html>
